apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-recommender
  namespace: mlops
  labels:
    grafana_dashboard: "1"
data:
  recommender-dashboard.json: |
    {
      "annotations": {
        "list": [
          {
            "builtIn": 1,
            "datasource": {
              "type": "grafana",
              "uid": "-- Mixed --"
            },
            "enable": true,
            "hide": true,
            "name": "Annotations & Alerts",
            "type": "dashboard"
          }
        ]
      },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 0,
      "id": null,
      "links": [],
      "liveNow": false,
      "panels": [
        {
          "title": "FastAPI Throughput",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 0 },
          "targets": [
            {
              "expr": "sum(rate(http_requests_total{app='api-recommendation'}[5m])) by (handler)",
              "legendFormat": "{{handler}}"
            }
          ]
        },
        {
          "title": "FastAPI P99 Latency",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 0 },
          "targets": [
            {
              "expr": "histogram_quantile(0.99, sum(rate(http_request_duration_seconds_bucket{app='api-recommendation'}[5m])) by (le))",
              "legendFormat": "P99 Latency"
            }
          ]
        },
        {
          "title": "Pod CPU Usage",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 8 },
          "targets": [
            {
              "expr": "sum(node_namespace_pod_container:container_cpu_usage_seconds_total:sum_irate{pod=~'airflow.*|kafka.*|spark.*'}) by (pod)",
              "legendFormat": "{{pod}}"
            }
          ]
        },
        {
          "title": "Pod Memory Usage",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 8 },
          "targets": [
            {
              "expr": "sum(container_memory_working_set_bytes{pod=~'airflow.*|kafka.*|spark.*'}) by (pod)",
              "legendFormat": "{{pod}}"
            }
          ]
        },
        {
          "title": "Total Processed Recommendations",
          "type": "stat",
          "gridPos": { "h": 4, "w": 24, "x": 0, "y": 16 },
          "targets": [
            {
              "expr": "total_recommendations_count",
              "legendFormat": "Total Recommendations"
            }
          ]
        }
      ],
      "schemaVersion": 38,
      "style": "dark",
      "tags": ["recommender", "production"],
      "templating": {
        "list": []
      },
      "time": {
        "from": "now-6h",
        "to": "now"
      },
      "timepicker": {},
      "timezone": "",
      "title": "Real-Time Recommender Dashboard",
      "uid": "recommender-dashboard",
      "version": 1
    }
