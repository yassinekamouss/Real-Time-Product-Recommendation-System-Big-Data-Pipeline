apiVersion: "sparkoperator.k8s.io/v1beta2"
kind: SparkApplication
metadata:
  name: streaming-recommender-{{ ds_nodash }}
  namespace: default
spec:
  type: Python
  pythonVersion: "3"
  mode: cluster
  image: "DOCKERHUB_USERNAME_PLACEHOLDER/amazon-recommender-spark:latest"
  imagePullPolicy: Always
  mainApplicationFile: "local:///opt/spark/src/spark/streaming_recommender.py"
  sparkVersion: "3.5.1"
  arguments:
    - "--packages"
    - "org.apache.spark:spark-sql-kafka-0-10_2.12:3.5.1"
  restartPolicy:
    type: Always
  driver:
    cores: 1
    coreLimit: "1200m"
    memory: "1024m"
    serviceAccount: spark
    env:
      - name: S3_DATA_LAKE_BUCKET
        value: "{{ var.value.S3_DATA_LAKE_BUCKET }}"
      - name: MLFLOW_TRACKING_URI
        value: "{{ var.value.MLFLOW_TRACKING_URI }}"
  executor:
    cores: 1
    instances: 1
    memory: "1024m"
    env:
      - name: S3_DATA_LAKE_BUCKET
        value: "{{ var.value.S3_DATA_LAKE_BUCKET }}"
      - name: MLFLOW_TRACKING_URI
        value: "{{ var.value.MLFLOW_TRACKING_URI }}"
